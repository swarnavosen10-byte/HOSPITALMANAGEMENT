<!DOCTYPE html>
<html>
<head>
  <title>Ambulance Map</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      text-align: center;
    }

    h2 {
      background: red;
      color: white;
      padding: 10px;
      margin: 0;
    }

    #map {
      height: 90vh;
      width: 100%;
    }
  </style>
</head>

<body>

  <h2>🚑 Ambulance Tracking Map</h2>
  <div id="map"></div>

  <script>
    function initMap() {
      const defaultLocation = { lat: 22.5726, lng: 88.3639 };

      const map = new google.maps.Map(document.getElementById("map"), {
        zoom: 11,
        center: defaultLocation,
      });

      // Load hospitals
      fetch("http://127.0.0.1:8000/hospitals")
        .then(response => response.json())
        .then(hospitals => {
          console.log("Hospitals data:", hospitals);

          hospitals.forEach(hospital => {
            let iconUrl;

            if (hospital.beds > 0) {
              iconUrl = "http://maps.google.com/mapfiles/ms/icons/green-dot.png";
            } else {
              iconUrl = "http://maps.google.com/mapfiles/ms/icons/red-dot.png";
            }

            const marker = new google.maps.Marker({
              position: { lat: hospital.lat, lng: hospital.lng },
              map: map,
              title: hospital.name,
              icon: iconUrl
            });

            const infoWindow = new google.maps.InfoWindow({
              content: `<b>${hospital.name}</b><br>Vacant Beds: ${hospital.beds}`
            });

            marker.addListener("click", () => {
              infoWindow.open(map, marker);
            });
          });
        })
        .catch(error => {
          console.error("Error loading hospitals:", error);
          alert("Hospital data is not loading from backend");
        });

      // User location
      if (navigator.geolocation) {
        navigator.geolocation.getCurrentPosition(
          (position) => {
            const userLocation = {
              lat: position.coords.latitude,
              lng: position.coords.longitude,
            };

            map.setCenter(userLocation);

            new google.maps.Marker({
              position: userLocation,
              map: map,
              title: "Your Location",
              label: "📍"
            });
          },
          () => {
            alert("Location permission denied");
          }
        );
      }

      // Ambulance
      let ambulancePosition = {
        lat: 22.5726,
        lng: 88.3639
      };

      const ambulance = new google.maps.Marker({
        position: ambulancePosition,
        map: map,
        title: "Ambulance",
        label: "🚑"
      });

      function moveAmbulance() {
        ambulancePosition.lat += 0.0005;
        ambulancePosition.lng += 0.0005;
        ambulance.setPosition(ambulancePosition);
      }

      setInterval(moveAmbulance, 1000);
    }
  </script>

  <script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyA_NjLvRdUABqCv4mBvVb8eJemvswvlZ-Q&callback=initMap" async defer></script>

</body>
</html>
