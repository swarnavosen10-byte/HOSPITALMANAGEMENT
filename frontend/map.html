<!DOCTYPE html>
<html>
<head>
  <title>Ambulance Map</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f4f8fb;
    }

    h2 {
      background: #0f4c81;
      color: white;
      padding: 15px;
      margin: 0;
      text-align: center;
    }

    .top-controls {
      background: white;
      padding: 15px;
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      justify-content: center;
      align-items: center;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }

    .top-controls input {
      padding: 10px;
      width: 250px;
      border: 1px solid #ccc;
      border-radius: 8px;
      font-size: 14px;
    }

    .top-controls button {
      padding: 10px 14px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      background: #0f4c81;
      color: white;
      font-size: 14px;
    }

    .top-controls button:hover {
      background: #1565a9;
    }

    .legend {
      text-align: center;
      padding: 10px;
      background: #eef4f8;
      font-size: 14px;
    }

    .main-container {
      display: flex;
      height: calc(100vh - 140px);
    }

    #map {
      flex: 3;
      height: 100%;
    }

    #info-panel {
      flex: 1;
      background: white;
      border-left: 1px solid #ddd;
      padding: 20px;
      overflow-y: auto;
      box-shadow: -2px 0 8px rgba(0,0,0,0.05);
    }

    #info-panel h3 {
      margin-top: 0;
      color: #0f4c81;
    }

    .hospital-card {
      background: #f8fbfd;
      border: 1px solid #dce7f0;
      border-radius: 10px;
      padding: 12px;
      margin-bottom: 12px;
    }

    .hospital-card p {
      margin: 6px 0;
    }

    .small-note {
      color: #666;
      font-size: 13px;
    }
  </style>
</head>

<body>

  <h2>🏥 Hospital Availability Map</h2>

  <div class="top-controls">
    <input type="text" id="searchBox" placeholder="Search hospital by name..." onkeyup="handleEnter(event)" />
    <button onclick="applyFilter('all')">All Hospitals</button>
    <button onclick="applyFilter('available')">Beds Available</button>
    <button onclick="applyFilter('nobeds')">No Beds</button>
    <button onclick="searchHospital()">Search</button>
    <button onclick="findNearestHospital()">Nearest Hospital</button>
    <button onclick="recommendBestHospitals()">Best Hospitals</button>
  </div>

  <div class="legend">
    🟢 Green = Beds Available &nbsp;&nbsp;&nbsp; 🔴 Red = No Beds
  </div>

  <div class="main-container">
    <div id="map"></div>

    <div id="info-panel">
      <h3>Hospital Details</h3>
      <p class="small-note">Click a hospital marker to see details here.</p>
      <div id="details"></div>
    </div>
  </div>

  <script>
    let map;
    let allHospitals = [];
    let markers = [];
    let currentFilter = "all";
    let selectedMarker = null;
    let userLocation = null;

    function initMap() {
      const defaultLocation = { lat: 22.5726, lng: 88.3639 };

      map = new google.maps.Map(document.getElementById("map"), {
        zoom: 11,
        center: defaultLocation,
      });

     fetch("http://127.0.0.1:8000/hospitals")
  .then(response => response.json())
  .then(hospitals => {
    console.log("Hospitals data:", hospitals);
    alert("Hospitals loaded: " + hospitals.length);
    allHospitals = hospitals;
    showHospitals(allHospitals);
  })
  .catch(error => {
    console.error("Error loading hospitals:", error);
    alert("Hospital data is not loading from backend");
  });

      if (navigator.geolocation) {
        navigator.geolocation.getCurrentPosition(
          (position) => {
           userLocation = {
              lat: position.coords.latitude,
              lng: position.coords.longitude,
            };

            new google.maps.Marker({
              position: userLocation,
              map: map,
              title: "Your Location",
              label: "📍"
            });
          },
          () => {
            alert("Location permission denied");
          }
        );
      }

      let ambulancePosition = {
        lat: 22.5726,
        lng: 88.3639
      };

      const ambulance = new google.maps.Marker({
        position: ambulancePosition,
        map: map,
        title: "Ambulance",
        label: "🚑"
      });

      function moveAmbulance() {
        ambulancePosition.lat += 0.0005;
        ambulancePosition.lng += 0.0005;
        ambulance.setPosition(ambulancePosition);
      }

      setInterval(moveAmbulance, 1000);
    }

    function clearMarkers() {
      markers.forEach(marker => marker.setMap(null));
      markers = [];
    }

    function showHospitals(hospitals) {
      clearMarkers();

      hospitals.forEach(hospital => {
        let iconUrl;

        if (hospital.beds > 0) {
          iconUrl = "http://maps.google.com/mapfiles/ms/icons/green-dot.png";
        } else {
          iconUrl = "http://maps.google.com/mapfiles/ms/icons/red-dot.png";
        }

        const marker = new google.maps.Marker({
          
          position: { lat: hospital.lat, lng: hospital.lng },
          map: map,
          title: hospital.name,
          icon: iconUrl
        });
marker.hospitalBeds = hospital.beds;
        const infoWindow = new google.maps.InfoWindow({
          content: `<b>${hospital.name}</b><br>Vacant Beds: ${hospital.beds}`
        });

        marker.addListener("click", () => {

  // reset previous selected marker
  if (selectedMarker) {
    let oldIcon =
      selectedMarker.hospitalBeds > 0
        ? "http://maps.google.com/mapfiles/ms/icons/green-dot.png"
        : "http://maps.google.com/mapfiles/ms/icons/red-dot.png";

    selectedMarker.setIcon(oldIcon);
  }

  // highlight current marker (BLUE ICON)
  marker.setIcon("http://maps.google.com/mapfiles/ms/icons/blue-dot.png");

  selectedMarker = marker;

  infoWindow.open(map, marker);
  showHospitalDetails(hospital);
});

        markers.push(marker);
      });
    }

    function showHospitalDetails(hospital) {
      document.getElementById("details").innerHTML = `
        <div class="hospital-card">
          <p><strong>Name:</strong> ${hospital.name}</p>
          <p><strong>Available Beds:</strong> ${hospital.beds}</p>
          <p><strong>Latitude:</strong> ${hospital.lat}</p>
          <p><strong>Longitude:</strong> ${hospital.lng}</p>
          <p><strong>Doctors:</strong> ${hospital.doctors ?? "Not added yet"}</p>
          <p><strong>Ambulances:</strong> ${hospital.ambulances ?? "Not added yet"}</p>
        </div>
      `;
    }

   function applyFilter(type) {
  currentFilter = type;

  let filteredHospitals = allHospitals;

  if (type === "available") {
    filteredHospitals = allHospitals.filter(hospital => hospital.beds > 0);
  } else if (type === "nobeds") {
    filteredHospitals = allHospitals.filter(hospital => hospital.beds === 0);
  }

  const searchText = document.getElementById("searchBox").value.trim().toLowerCase();

  if (searchText !== "") {
    filteredHospitals = filteredHospitals.filter(hospital =>
      hospital.name.toLowerCase().includes(searchText)
    );
  }

  showHospitals(filteredHospitals);

  if (filteredHospitals.length > 0) {
    map.setCenter({
      lat: filteredHospitals[0].lat,
      lng: filteredHospitals[0].lng
    });
    map.setZoom(13);

    document.getElementById("details").innerHTML = `
      <div class="hospital-card">
        <p><strong>${filteredHospitals.length}</strong> hospital(s) found.</p>
        <p>Click a marker to see full details.</p>
      </div>
    `;
  } else {
    document.getElementById("details").innerHTML = `
      <div class="hospital-card">
        <p><strong>No hospital found.</strong></p>
        <p>Try another name like Apollo, AMRI, Fortis, Medica.</p>
      </div>
    `;
    alert("No hospital found");
  }
}

function searchHospital() {
  applyFilter(currentFilter);
}
function handleEnter(event) {
  if (event.key === "Enter") {
    searchHospital();
  }
}
function getDistance(lat1, lng1, lat2, lng2) {
  const R = 6371;
  const dLat = (lat2 - lat1) * Math.PI / 180;
  const dLng = (lng2 - lng1) * Math.PI / 180;

  const a =
    Math.sin(dLat / 2) * Math.sin(dLat / 2) +
    Math.cos(lat1 * Math.PI / 180) *
    Math.cos(lat2 * Math.PI / 180) *
    Math.sin(dLng / 2) * Math.sin(dLng / 2);

  const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
  return R * c;
}function findNearestHospital() {
  if (!userLocation) {
    alert("User location not available");
    return;
  }

  let nearest = null;
  let minDistance = Infinity;

  allHospitals.forEach(hospital => {
    const dist = getDistance(
      userLocation.lat,
      userLocation.lng,
      hospital.lat,
      hospital.lng
    );

    if (dist < minDistance) {
      minDistance = dist;
      nearest = hospital;
    }
  });

  if (nearest) {
    map.setCenter({
      lat: nearest.lat,
      lng: nearest.lng
    });

    map.setZoom(14);

    document.getElementById("details").innerHTML = `
      <div class="hospital-card">
        <p><strong>Name:</strong> ${nearest.name}</p>
        <p><strong>Available Beds:</strong> ${nearest.beds}</p>
        <p><strong>Doctors:</strong> ${nearest.doctors ?? "Not added yet"}</p>
        <p><strong>Ambulances:</strong> ${nearest.ambulances ?? "Not added yet"}</p>
        <p><strong>Distance:</strong> ${minDistance.toFixed(2)} km</p>
      </div>
    `;

    alert("Nearest hospital is: " + nearest.name);
  }
}
function recommendBestHospitals() {
  if (!userLocation) {
    alert("User location not available");
    return;
  }

  let rankedHospitals = allHospitals.map(hospital => {
    const distance = getDistance(
      userLocation.lat,
      userLocation.lng,
      hospital.lat,
      hospital.lng
    );

    const score =
      (hospital.beds * 5) +
      ((hospital.doctors ?? 0) * 3) +
      ((hospital.ambulances ?? 0) * 2) -
      (distance * 2);

    return {
      ...hospital,
      distanceFromUser: distance,
      score: score
    };
  });

  rankedHospitals.sort((a, b) => b.score - a.score);

  const top3 = rankedHospitals.slice(0, 3);

  showHospitals(top3);

  if (top3.length > 0) {
    map.setCenter({
      lat: top3[0].lat,
      lng: top3[0].lng
    });
    map.setZoom(13);
  }

  let detailsHTML = `
  <div class="hospital-card">
    <h4>Top 3 Recommended Hospitals</h4>
  </div>
`;

top3.forEach((hospital, index) => {
  detailsHTML += `
    <div class="hospital-card">
      <p><strong>${index + 1}. ${hospital.name}</strong></p>
      <p>Beds: ${hospital.beds}</p>
      <p>Doctors: ${hospital.doctors ?? "Not added yet"}</p>
      <p>Ambulances: ${hospital.ambulances ?? "Not added yet"}</p>
      <p>Distance: ${hospital.distanceFromUser.toFixed(2)} km</p>
      <p>Score: ${hospital.score.toFixed(2)}</p>
    </div>
  `;
});

document.getElementById("details").innerHTML = detailsHTML;
 } 
function recommendBestHospitals() {
  if (!userLocation) {
    alert("Please wait, getting your location...");
    return;
  }

  let rankedHospitals = allHospitals.map(hospital => {
    const distance = getDistance(
      userLocation.lat,
      userLocation.lng,
      hospital.lat,
      hospital.lng
    );

    const score =
      (hospital.beds * 5) +
      ((hospital.doctors ?? 0) * 3) +
      ((hospital.ambulances ?? 0) * 2) -
      (distance * 2);

    return {
      ...hospital,
      distanceFromUser: distance,
      score: score
    };
  });

  rankedHospitals.sort((a, b) => b.score - a.score);

  const top3 = rankedHospitals.slice(0, 3);

  alert("Top hospitals found: " + top3.length);

  showHospitals(top3);

  if (top3.length > 0) {
    map.setCenter({
      lat: top3[0].lat,
      lng: top3[0].lng
    });
    map.setZoom(13);
  }

  if (top3.length === 0) {
    document.getElementById("details").innerHTML = `
      <div class="hospital-card">
        <h4>Top 3 Recommended Hospitals</h4>
        <p>No hospitals found.</p>
      </div>
    `;
    return;
  }

  let html = `<div class="hospital-card"><h4>Top 3 Recommended Hospitals</h4></div>`;

  if (top3[0]) {
    html += `
      <div class="hospital-card">
        <p><strong>1. ${top3[0].name}</strong></p>
        <p>Beds: ${top3[0].beds}</p>
        <p>Doctors: ${top3[0].doctors ?? "Not added yet"}</p>
        <p>Ambulances: ${top3[0].ambulances ?? "Not added yet"}</p>
        <p>Distance: ${top3[0].distanceFromUser.toFixed(2)} km</p>
        <p>Score: ${top3[0].score.toFixed(2)}</p>
      </div>
    `;
  }

  if (top3[1]) {
    html += `
      <div class="hospital-card">
        <p><strong>2. ${top3[1].name}</strong></p>
        <p>Beds: ${top3[1].beds}</p>
        <p>Doctors: ${top3[1].doctors ?? "Not added yet"}</p>
        <p>Ambulances: ${top3[1].ambulances ?? "Not added yet"}</p>
        <p>Distance: ${top3[1].distanceFromUser.toFixed(2)} km</p>
        <p>Score: ${top3[1].score.toFixed(2)}</p>
      </div>
    `;
  }

  if (top3[2]) {
    html += `
      <div class="hospital-card">
        <p><strong>3. ${top3[2].name}</strong></p>
        <p>Beds: ${top3[2].beds}</p>
        <p>Doctors: ${top3[2].doctors ?? "Not added yet"}</p>
        <p>Ambulances: ${top3[2].ambulances ?? "Not added yet"}</p>
        <p>Distance: ${top3[2].distanceFromUser.toFixed(2)} km</p>
        <p>Score: ${top3[2].score.toFixed(2)}</p>
      </div>
    `;
  }

  document.getElementById("details").innerHTML = html;
}
  </script>

  <script src="https://maps.googleapis.com/maps/api/js?key=YOUR_API_KEY&callback=initMap"></script>

</body>
</html>
